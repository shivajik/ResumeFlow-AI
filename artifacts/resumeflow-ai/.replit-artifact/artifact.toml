kind = "web"
previewPath = "/"
title = "ResumeFlow AI"
version = "1.0.0"
id = "artifacts/resumeflow-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21619

[services.development]
run = "pnpm --filter @workspace/resumeflow-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resumeflow-ai", "run", "build" ]
publicDir = "artifacts/resumeflow-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21619"
BASE_PATH = "/"
